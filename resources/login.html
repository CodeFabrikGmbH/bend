<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" type="text/css" href="/static/css/styles.css?v=0.6.5"/>
    <title>bend — Login</title>
    <script>
        // redirect if logged in and origin is given
        {{if and .Origin .Name }}
        window.location = {{ .Origin }};
        {{end}}
    </script>
</head>
<body>
<div class="login-wrap">
    {{if .Name }}
    <form class="login-card" method="post" action="/login">
        <div class="brand">bend<span class="dot">.</span></div>
        <div class="sub">Angemeldet als {{ .Name }}</div>
        <input type="hidden" name="logout" value="true"/>
        <button class="btn block" type="submit">Logout</button>
    </form>
    {{else}}
    <form class="login-card" method="post" action="/login">
        <div class="brand">bend<span class="dot">.</span></div>
        <div class="sub">Bitte anmelden</div>

        <div class="field">
            <label for="username">Benutzername</label>
            <input class="input" type="text" id="username" name="username" autocomplete="username"/>
        </div>
        <div class="field">
            <label for="password">Passwort</label>
            <input class="input" type="password" id="password" name="password" autocomplete="current-password" required/>
        </div>

        {{ if .Error }}
        <div class="login-error">{{ .Error }}</div>
        {{ end }}

        <input type="hidden" name="origin" value="{{ .Origin }}"/>
        <button class="btn primary block" type="submit">Login</button>
    </form>
    {{end}}
</div>
</body>
</html>
