services:
  bend:
    restart: always
    build: .
    container_name: bend
    hostname: bend
    volumes:
      - ./db:/db
    ports:
      - 8080:8080
    environment:
      # HTTP listen address (default :8080)
      # - BEND_ADDR=:8080
      # Secure flag on session cookies. Default true (cookies sent over HTTPS only).
      # Set to false for plain-HTTP setups with Keycloak, otherwise login cookies
      # are dropped by the browser.
      # - COOKIE_SECURE=false
      # Optional Keycloak authentication. Leave KEYCLOAK_HOST unset to disable auth.
      # - KEYCLOAK_HOST=https://keycloak.example.com
      # - KEYCLOAK_CLIENT_ID=bend
      # - KEYCLOAK_REALM=my-realm
    networks:
      - default


